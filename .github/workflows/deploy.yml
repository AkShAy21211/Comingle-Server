name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main  

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t achu2002/comingle-server:latest .

      - name: Push Docker image to Docker Hub
        run: docker push achu2002/comingle-server:latest

      - name: Deploy to GCP
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            docker pull achu2002/comingle-server:latest
            docker stop comingle-backend || true
            docker rm comingle-backend || true
            docker run -d --name comingle-backend -p 5000:5000 --env-file .env --restart unless-stopped achu2002/comingle-server:latest
